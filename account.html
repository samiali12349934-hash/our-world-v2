<!DOCTYPE html>
<html>
<head>
    <title>Account - Our World V2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        section {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        body.dark section {
            background: #1e1e1e;
            color: white;
        }

        .account-info img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #388e3c;
        }

        .edit-btn {
            padding: 10px 20px;
            background: #388e3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        body.dark .modal-content {
            background: #1e1e1e;
            color: white;
        }

        .modal-content input {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="account.html">Account</a>
    <button id="theme-toggle">🌙 Dark Mode</button>
</nav>

<section>
    <h2>User Profile</h2>

    <div class="account-info">
        <img id="avatar-img" src="https://i.imgur.com/4Z7bZ5Y.png">
        <h3 id="user-name">Guest</h3>
    </div>

    <p>Email: <span id="user-email">Not set</span></p>

    <button class="edit-btn" id="edit-btn">Edit Profile</button>
</section>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <input type="text" id="edit-name" placeholder="Enter your name">
        <input type="email" id="edit-email" placeholder="Enter your email">
        <input type="text" id="edit-avatar" placeholder="Avatar image URL">
        <button onclick="saveProfile()">Save</button>
    </div>
</div>

<script>
    const modal = document.getElementById("modal");

    document.getElementById("edit-btn").onclick = () => {
        modal.style.display = "flex";
    };

    window.onclick = (e) => {
        if(e.target == modal){
            modal.style.display = "none";
        }
    };

    function saveProfile(){
        const name = document.getElementById("edit-name").value;
        const email = document.getElementById("edit-email").value;
        const avatar = document.getElementById("edit-avatar").value;

        if(name) localStorage.setItem("name", name);
        if(email) localStorage.setItem("email", email);
        if(avatar) localStorage.setItem("avatar", avatar);

        loadProfile();
        modal.style.display = "none";
    }

    function loadProfile(){
        const name = localStorage.getItem("name");
        const email = localStorage.getItem("email");
        const avatar = localStorage.getItem("avatar");

        if(name) document.getElementById("user-name").textContent = name;
        if(email) document.getElementById("user-email").textContent = email;
        if(avatar) document.getElementById("avatar-img").src = avatar;
    }

    loadProfile();
</script>

</body>
</html>
